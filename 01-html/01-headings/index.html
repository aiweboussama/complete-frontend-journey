<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />

    <title>HTML Headings</title>
    <style>
      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
      }
      html {
        font-size: 16px;
        scroll-behavior: smooth;
      }
      body {
        background-color: #f4f7ff;
        color: #0f172a;
        font-family: Arial, Helvetica, sans-serif;
        padding: 2.5rem;
        line-height: 1.7;
      }
      h1 {
        font-weight: 700;
        font-size: 2.25rem;
        max-width: 1000px;
        padding: 2rem;
        letter-spacing: 0.5px;
        text-transform: capitalize;
      }
      .p1,
      .p2 {
        line-height: 1.75;
        font-size: 1rem;
        color: #0f172a;
        background-color: #d9f7f0;
        max-width: 820px;
        min-width: 320px;
        border-radius: 16px;
        box-shadow: 0 12px 28px rgba(15, 23, 42, 0.15);
        padding: 2rem;
        border: 1px solid #4f46e5;
        margin: 2.5rem;
      }
    </style>
  </head>

  <body>
    <h1>HTML Headings Example</h1>

    <div>
      <p class="p1">
        Headings in HTML are used to define titles and subtitles. There are 6
        levels of headings, from h1 to h6.
      </p>
    </div>

    <div class="p2">
      <h2>Heading Level 2</h2>
      <h3>Heading Level 3</h3>
      <h4>Heading Level 4</h4>
      <h5>Heading Level 5</h5>
      <h6>Heading Level 6</h6>
    </div>
  </body>
</html>
