<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />

    <title>HTML Headings</title>

    <!-- CSS File -->
    <link
      rel="stylesheet"
      href="style.css"
    />
  </head>

  <body>
    <main class="page">
      <h1>HTML Headings Example</h1>

      <p>
        Headings in HTML are used to define titles and subtitles. There are 6
        levels of headings, from h1 to h6.
      </p>

      <section>
        <h2>Heading Level 2</h2>
        <h3>Heading Level 3</h3>
        <h4>Heading Level 4</h4>
        <h5>Heading Level 5</h5>
        <h6>Heading Level 6</h6>
      </section>
    </main>
  </body>
</html>
